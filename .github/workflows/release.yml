name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload unsigned installer
        id: upload-installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.exe

    outputs:
      installer-artifact-id: ${{ steps.upload-installer.outputs.artifact-id }}

  sign:
    needs: build
    runs-on: ubuntu-latest
    if: vars.SIGNPATH_SIGNING_ENABLED == 'true'
    steps:
      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: leaguide
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installer
          github-artifact-id: ${{ needs.build.outputs.installer-artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifacts

      - name: Upload signed installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-signed
          path: signed-artifacts/

  release:
    needs: [build, sign]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Try signed artifact first, fall back to unsigned
      - name: Download signed installer
        id: download-signed
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-signed
          path: release-assets/
        continue-on-error: true

      - name: Download unsigned installer (fallback)
        if: steps.download-signed.outcome != 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
